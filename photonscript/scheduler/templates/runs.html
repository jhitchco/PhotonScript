<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotonScript - Imaging Runs</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .nav a { color: #7dd3fc; text-decoration: none; margin-right: 1.5rem; }
        main { max-width: 1560px; margin: 0 auto; display: grid;
               grid-template-columns: 215px 1fr; gap: 1.2rem;
               align-items: start; }
        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
        #subTable { display:block; max-height: 460px; overflow-y:auto; }
        .night-chip { display:block; padding:.4rem .8rem; border-radius:8px;
                      background:rgba(255,255,255,.05); margin:0 0 .4rem 0;
                      cursor:pointer; white-space:nowrap; }
        .night-chip.active { background:#1d4ed8; }
        .fchip { display:inline-block; padding:.25rem .7rem; border-radius:999px;
                 background:rgba(255,255,255,.06); margin:0 .35rem .35rem 0;
                 cursor:pointer; font-size:.8rem; }
        .fchip.active { background:#1d4ed8; }
        table.runs { width:100%; border-collapse:collapse; font-size:.87rem; }
        table.runs th, table.runs td { padding:.35rem .6rem; text-align:right;
            border-bottom:1px solid rgba(255,255,255,.07); }
        table.runs th:first-child, table.runs td:first-child { text-align:left; }
        .score-ring { font-size:2.6rem; font-weight:800; }
        .bd { font-size:.78rem; opacity:.75; }
        .night-title { font-size:1.25rem; font-weight:700; margin:0 0 .2rem 0; }
        .thumbs { display:flex; gap:.45rem; flex-wrap:wrap; padding:.4rem 0; }
        .thumbs figure { margin:0; text-align:center; width:132px; }
        .thumbs img { border-radius:6px; display:block; width:132px; }
        .thumbs figcaption { font-size:.6rem; opacity:.65; margin-top:.15rem;
                             line-height:1.25; }
        .rej { color:#f87171; }
        .ok { color:#4ade80; }
        .warn { color:#eab308; }
        #backfillBox { margin-top:.8rem; }
        .pbar { height:10px; border-radius:5px; background:rgba(255,255,255,.08);
                overflow:hidden; margin:.3rem 0; }
        .pbar > div { height:100%; background:#1d4ed8; width:0%;
                      transition:width .5s; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>PhotonScript</h1>
            <span class="subtitle">Imaging Runs — plan vs. reality</span>
            <span class="observatory-badge">{{ observatory.name }}</span>
        </div>
        <div class="nav">
            <a href="/">Dashboard</a>
            <a href="/system">System &amp; Config</a>
            <span class="version-stamp" style="opacity:.4;font-size:.72rem;margin-left:.8rem;" title="git commit running on this machine">{{ version }}</span>
        </div>
    </header>
    <main>
        <aside class="panel">
            <h2>Nights</h2>
            <div id="nightList">Loading…</div>
        </aside>
        <section class="panel" id="detailPanel" hidden>
            <div class="night-title" id="nightTitle"></div>
            <div style="display:flex;gap:2.5rem;align-items:center;flex-wrap:wrap;">
                <div style="text-align:center;">
                    <div class="score-ring" id="scoreTotal">–</div>
                    <div style="font-size:.7rem;letter-spacing:.08em;opacity:.5;">NIGHT SCORE</div>
                </div>
                <div id="scoreBreakdown" class="bd"></div>
                <div id="reportNumbers" class="bd"></div>
            </div>
            <div style="margin-top:.8rem;">
                <a class="btn btn-primary" id="bundleBtn" href="#" download>Download night bundle (.zip)</a>
                <button class="btn btn-secondary" id="regradeBtn">Re-grade night</button>
                <button class="btn btn-secondary" id="libraryBtn" title="Hardlink QA-accepted lights into the Library folder for Syncthing">Rebuild library</button>
            </div>
            <div id="backfillBox" class="bd" hidden>
                <div id="backfillLabel"></div>
                <div class="pbar"><div id="backfillBar"></div></div>
            </div>
            <h2 style="margin-top:1.2rem;">Plan vs. Actual</h2>
            <table class="runs" id="pvaTable"></table>
            <h2 style="margin-top:1.2rem;">Calibration Frames</h2>
            <div id="calibration" class="bd"></div>
            <h2 style="margin-top:1.2rem;">Phase Activity <span class="bd">(from NINA log, best-effort)</span></h2>
            <div id="phases" class="bd"></div>
            <h2 style="margin-top:1.2rem;">Subs
                <label style="font-size:.75rem;opacity:.7;font-weight:normal;margin-left:1rem;">
                <input type="checkbox" id="annotateToggle"> show star detections</label></h2>
            <div id="filterChips"></div>
            <div class="bd" id="thumbCount"></div>
            <div class="thumbs" id="thumbStrip"></div>
            <table class="runs" id="subTable"></table>
        </section>
    </main>
    <script>
    let currentDate = null, currentDetail = null, subFilter = 'ALL';
    let showAllThumbs = false;
    async function loadNights() {
        const r = await fetch('/api/runs');
        const nights = await r.json();
        const box = document.getElementById('nightList');
        if (!nights.length) { box.textContent = 'No recorded nights yet.'; return; }
        box.innerHTML = nights.map(n =>
            '<span class="night-chip" data-date="' + n.date + '">' + n.date +
            ' <span style="opacity:.6;font-size:.75rem;">' + n.subs_logged +
            ' subs</span></span>').join('');
        box.querySelectorAll('.night-chip').forEach(el =>
            el.addEventListener('click', () => loadDetail(el.dataset.date)));
        loadDetail(nights[0].date);
    }
    async function loadDetail(date) {
        currentDate = date; subFilter = 'ALL'; showAllThumbs = false;
        document.querySelectorAll('.night-chip').forEach(el =>
            el.classList.toggle('active', el.dataset.date === date));
        const panel = document.getElementById('detailPanel');
        panel.hidden = false;
        document.getElementById('scoreTotal').textContent = '…';
        document.getElementById('bundleBtn').href = '/api/runs/' + date + '/bundle';
        document.getElementById('regradeBtn').onclick = async () => {
            if (!confirm('Delete grades for ' + date + ' and re-grade all subs?')) return;
            showBackfill({running: true, graded: 0, total_files: 0,
                          current: 'starting…'});
            await fetch('/api/runs/' + date + '/regrade', {method: 'POST'});
            pollBackfill(date);
        };
        document.getElementById('libraryBtn').onclick = async () => {
            const btn = document.getElementById('libraryBtn');
            btn.disabled = true; btn.textContent = 'Building…';
            try {
                const r = await fetch('/api/library/rebuild', {method: 'POST'});
                const res = await r.json();
                alert('Library: ' + res.library + '\n' + res.linked +
                      ' new files linked · ' + res.already_there +
                      ' already there · ' + res.rejected_excluded +
                      ' rejects excluded');
            } finally { btn.disabled = false; btn.textContent = 'Rebuild library'; }
        };
        const r = await fetch('/api/runs/' + date);
        const d = await r.json();
        currentDetail = d;
        if (d.backfill && (d.backfill.running || d.backfill.pending > 0)) {
            showBackfill(d.backfill);
            pollBackfill(date);
        } else {
            document.getElementById('backfillBox').hidden = true;
            document.getElementById('regradeBtn').disabled = false;
        }
        // Title: date + target names
        const names = [...new Set(d.subs.map(s => s.target).filter(t => t && t !== '?'))];
        if (!names.length && d.plan) d.plan.targets.forEach(t => names.push(t.name));
        document.getElementById('nightTitle').textContent =
            date + (names.length ? ' — ' + names.join(', ') : '');
        const sc = d.score;
        const el = document.getElementById('scoreTotal');
        el.textContent = sc.total;
        el.style.color = sc.total >= 70 ? '#4ade80' : sc.total >= 40 ? '#eab308' : '#f87171';
        document.getElementById('scoreBreakdown').innerHTML =
            Object.entries(sc.breakdown).map(([k, v]) =>
                k.replace(/_/g, ' ') + ': <b>' + v.value + '</b> (×' + v.weight + ')'
            ).join('<br>');
        const rep = d.report;
        document.getElementById('reportNumbers').innerHTML =
            'safe ' + rep.safe_hours.toFixed(1) + 'h · shutter ' +
            rep.shutter_hours.toFixed(1) + 'h · integrating ' +
            rep.integrating_hours.toFixed(1) + 'h<br>utilization ' +
            rep.sky_utilization_pct + '% · efficiency ' + rep.photon_efficiency_pct + '%';
        document.getElementById('pvaTable').innerHTML =
            '<tr><th>Target</th><th>Filter</th><th>Planned</th><th>Attempted</th>' +
            '<th>Accepted</th><th>med HFR</th><th>med Ecc</th><th>med Bkg</th></tr>' +
            d.table.map(t => '<tr><td>' + t.target + '</td><td>' + t.filter +
                '</td><td>' + t.planned + '</td><td>' + t.attempted + '</td><td class="' +
                (t.accepted >= t.attempted && t.attempted ? 'ok' : '') + '">' + t.accepted +
                '</td><td>' + (t.median_hfr ?? '–') + '</td><td>' + (t.median_ecc ?? '–') +
                '</td><td>' + (t.median_background ?? '–') + '</td></tr>').join('');
        // Calibration frames
        const cal = d.calibration || {frames: {}, advice: []};
        const calBox = document.getElementById('calibration');
        const rows = Object.entries(cal.frames).map(([typ, g]) => {
            const filts = Object.entries(g.filters).map(([f, n]) => f + '×' + n).join(', ');
            const exps = Object.entries(g.exposures).map(([e, n]) => e + '×' + n).join(', ');
            return '<b>' + typ + '</b>: ' + g.count + ' frames (' + filts +
                   (exps ? ' · ' + exps : '') + ')';
        });
        calBox.innerHTML = (rows.length ? rows.join('<br>')
                : 'no calibration frames captured this night') +
            (cal.advice.length ? '<br>' + cal.advice.map(a =>
                '<span class="warn">⚠ ' + a + '</span>').join('<br>') : '');
        document.getElementById('phases').innerHTML = Object.keys(d.phases).length
            ? Object.entries(d.phases).map(([k, v]) =>
                '<b>' + k + '</b>: ' + v.events + ' log events (' +
                (v.first || '?').slice(11, 16) + ' → ' + (v.last || '?').slice(11, 16) + ')'
              ).join(' · ')
            : 'no phase data found in NINA log';
        renderSubs();
    }
    function renderSubs() {
        const d = currentDetail;
        if (!d) return;
        const all = d.subs;
        // Filter chips with counts
        const counts = {};
        all.forEach(s => { counts[s.filter] = (counts[s.filter] || 0) + 1; });
        const chips = ['ALL', ...Object.keys(counts).sort()];
        document.getElementById('filterChips').innerHTML = chips.map(f =>
            '<span class="fchip' + (subFilter === f ? ' active' : '') +
            '" data-f="' + f + '">' + f +
            (f === 'ALL' ? ' ' + all.length : ' ' + counts[f]) + '</span>').join('');
        document.querySelectorAll('.fchip').forEach(el =>
            el.addEventListener('click', () => { subFilter = el.dataset.f; renderSubs(); }));
        const subs = subFilter === 'ALL' ? all
                     : all.filter(s => s.filter === subFilter);
        const step = showAllThumbs ? 1 : Math.max(1, Math.ceil(subs.length / 24));
        const shown = subs.filter((s, i) => i % step === 0);
        document.getElementById('thumbCount').innerHTML = step > 1
            ? 'showing ' + shown.length + ' of ' + subs.length +
              ' · <a href="#" id="thumbAll">show all</a>'
            : (showAllThumbs && subs.length > 24
               ? 'showing all ' + subs.length +
                 ' · <a href="#" id="thumbAll">show fewer</a>' : '');
        document.getElementById('thumbStrip').innerHTML = shown
            .map(s => '<figure><img loading="lazy" src="/api/runs/' + currentDate +
                '/thumb?file=' + encodeURIComponent(s.file) + '&w=264' +
                (document.getElementById('annotateToggle').checked ? '&annotate=true' : '') + '">' +
                '<figcaption>' + (s.time || '').slice(11, 16) + ' · ' + s.filter + ' ' +
                Math.round(s.exp_s) + 's' + (s.passed_qa ? '' : ' <span class="rej">✗</span>') +
                '<br>HFR ' + (s.hfr ?? '–') + ' · ★' + (s.stars ?? '–') +
                ' · bkg ' + (s.background ?? '–') + '</figcaption></figure>')
            .join('');
        const allLink = document.getElementById('thumbAll');
        if (allLink) allLink.onclick = (e) => {
            e.preventDefault(); showAllThumbs = !showAllThumbs; renderSubs();
        };
        document.getElementById('subTable').innerHTML =
            '<tr><th>Time (UTC)</th><th>Target</th><th>Filter</th><th>Exp</th>' +
            '<th>HFR</th><th>Ecc</th><th>Stars</th><th>Bkg</th><th>QA</th></tr>' +
            subs.map(s => '<tr><td>' + (s.time || '').slice(11, 19) + '</td><td>' +
                s.target + '</td><td>' + s.filter + '</td><td>' + Math.round(s.exp_s) +
                's</td><td>' + (s.hfr ?? '–') + '</td><td>' + (s.ecc ?? '–') +
                '</td><td>' + (s.stars ?? '–') + '</td><td>' + (s.background ?? '–') +
                '</td><td class="' + (s.passed_qa ? 'ok' : 'rej') + '">' +
                (s.passed_qa ? 'pass' : (s.reason || 'reject')) + '</td></tr>').join('');
    }
    function fmtEta(s) {
        if (s == null) return '';
        return s >= 60 ? '~' + Math.floor(s / 60) + 'm ' + (s % 60) + 's left'
                       : '~' + s + 's left';
    }
    function showBackfill(b) {
        const box = document.getElementById('backfillBox');
        box.hidden = false;
        document.getElementById('regradeBtn').disabled = true;
        const pct = b.total_files ? Math.round(b.graded / b.total_files * 100) : 0;
        document.getElementById('backfillBar').style.width = pct + '%';
        document.getElementById('backfillLabel').innerHTML =
            '<b>Re-grading:</b> ' + b.graded + '/' + (b.total_files || '?') +
            (b.current ? ' · <span style="opacity:.7">' +
                b.current.split(/[\\/]/).pop() + '</span>' +
                (b.current_s != null ? ' <span style="opacity:.5">(' +
                    b.current_s + 's)</span>' : '') : '') +
            (b.rate ? ' · ' + b.rate + '/s · ' + fmtEta(b.eta_s) : '') +
            (b.last_error ? ' · <span class="rej">last error: ' +
                b.last_error + '</span>' : '');
    }
    let pollTimer = null;
    function pollBackfill(date) {
        clearTimeout(pollTimer);
        pollTimer = setTimeout(async () => {
            if (currentDate !== date) return;
            try {
                const r = await fetch('/api/runs/' + date + '/backfill');
                const b = await r.json();
                if (b.running || b.pending > 0) {
                    showBackfill(b);
                } else {
                    document.getElementById('backfillBox').hidden = true;
                    loadDetail(date);   // done: render final numbers
                    return;
                }
            } catch (e) { /* transient — keep polling */ }
            pollBackfill(date);
        }, 2500);
    }
    document.getElementById('annotateToggle').addEventListener('change', renderSubs);
    loadNights();
    </script>
</body>
</html>
